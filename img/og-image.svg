<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16202b"/>
      <stop offset="1" stop-color="#1f4e6b"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="30%" r="40%">
      <stop offset="0" stop-color="#2f7da8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2f7da8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Square canvas. Visible OG band is y 285..915 after centre-crop to 1200x630. -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- top accent bar (top of crop ~285) -->
  <rect x="0" y="285" width="1200" height="6" fill="#2f7da8"/>

  <!-- brand mark -->
  <text x="80" y="372" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="1" fill="#ffffff">MCA<tspan fill="#9fd0e6">.</tspan></text>

  <!-- eyebrow -->
  <text x="80" y="500" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="5" fill="#9fd0e6">SENIOR FRONT END DEVELOPER</text>

  <!-- name -->
  <text x="78" y="592" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#ffffff">Marikaimu Chris Ardoña</text>

  <!-- subline -->
  <text x="80" y="652" font-family="Helvetica, Arial, sans-serif" font-size="29" font-weight="400" fill="#c8d3dc">Leading the front end of payments, identity, events &amp; subscriptions.</text>

  <!-- tech row -->
  <text x="80" y="820" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="0.5" fill="#8fa6b5">Vue&#160;&#160;·&#160;&#160;JavaScript&#160;&#160;·&#160;&#160;GraphQL&#160;&#160;·&#160;&#160;Stripe&#160;&#160;·&#160;&#160;Make.com</text>

  <!-- url -->
  <text x="1120" y="820" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#6f8696">marikaimu-ardona.github.io</text>

  <!-- bottom accent bar (bottom of crop ~915) -->
  <rect x="0" y="909" width="1200" height="6" fill="#2f7da8"/>
</svg>
